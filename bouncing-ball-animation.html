<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Bouncing Ball Animation</title>
    <style>
        /* Styling the animated ball */
        .box{
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 70px; /*Makes it circular*/
            position: absolute;
            bottom: 0;
            left: 0;
            /*Applying animations */
            animation: animateX 3s linear infinite,  animateY 1s ease-out infinite alternate;
            
        }
        /*Container setup*/
    .container{
        position: relative;
        height: 80vh;
        width: 80vw;
        background-color: blue;
    }
/*Horizontal movement */
    @keyframes animateX{
        from{
            left: 0;
        }
        to{
left: 100%;
        }
    }
    /*Vertical movement*/
    @keyframes animateY{
        from{
bottom: 0;

        }
        to{
bottom: 100%;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
    
</body>
</html>
